{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{% static 'images/favicon-32x32.png' %}"
    />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />

    <title>{% block title %}{% endblock %}</title>
  </head>
  <body class="{% block theme %}{% endblock %} | bg-repeat">
    {% include 'includes/header.html' %} 
    {% block content %}{% endblock %}
    <script>
      const CREWS_URL = "{% url 'get_crew_json' %}";
      const DESTINATIONS_URL = "{% url 'get_destination_json' %}";
      const TECHNOLOGIES_URL = "{% url 'get_technology_json' %}";
    </script>
    <script src="{% static 'js/index.js' %}"></script>
  </body>
</html>
